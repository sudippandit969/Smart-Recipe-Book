{% extends "base.html" %}

{% block extra_css %}
<style>
  body {
    background-image: url('https://images.unsplash.com/photo-1556910103-1c02745aae4d?q=80&w=2000&auto=format&fit=crop');
  }
  .auth-card {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.5);
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    padding: 3rem;
  }
</style>
{% endblock %}

{% block start %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 85vh;">
  <div class="auth-card text-center" style="max-width: 500px; width: 100%;">
    <i class="bi bi-key text-primary" style="font-size: 4rem;"></i>
    <h3 class="fw-bold mt-3 mb-3" style="color: #333;">Reset Password</h3>
    <p class="text-muted mb-4">Enter your email address below, and we'll send you a link to reset your password.</p>
    
    <form method="post">
      {% csrf_token %}
      <div class="mb-4 text-start">
        <label class="form-label text-muted fw-bold small text-uppercase">Email Address</label>
        <div class="input-group">
          <span class="input-group-text bg-white text-muted border-end-0"><i class="bi bi-envelope"></i></span>
          <input type="email" name="email" class="form-control border-start-0 ps-0" required placeholder="name@example.com">
        </div>
      </div>
      
      <button type="submit" class="btn btn-custom w-100 py-2 fs-5 mb-3">Send Reset Link</button>
      
      <div class="text-center mt-3">
        <a href="/login/" class="text-decoration-none fw-bold text-muted"><i class="bi bi-arrow-left"></i> Back to Login</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
