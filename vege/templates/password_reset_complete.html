{% extends "base.html" %}

{% block extra_css %}
<style>
  body {
    background-image: url('https://images.unsplash.com/photo-1556910103-1c02745aae4d?q=80&w=2000&auto=format&fit=crop');
  }
  .auth-card {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.5);
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    padding: 3rem;
  }
</style>
{% endblock %}

{% block start %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 85vh;">
  <div class="auth-card text-center" style="max-width: 500px; width: 100%;">
    <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
    <h3 class="fw-bold mt-3 mb-3" style="color: #333;">Password Changed</h3>
    <p class="text-muted mb-4">Your password has been set. You may go ahead and log in now.</p>
    
    <div class="text-center mt-4">
      <a href="/login/" class="btn btn-custom w-100 py-2 fs-5">Log In</a>
    </div>
  </div>
</div>
{% endblock %}
